<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Сканер - Телефон</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; margin-bottom: 20px; }
        .status {
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
        }
        .connected { background: #d4edda; color: #155724; }
        .connecting { background: #fff3cd; color: #856404; }
        .camera-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            padding: 30px;
            border-radius: 20px;
            font-size: 24px;
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
        }
        .manual-input input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
        }
        .test-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        .test-btn {
            background: #6c757d;
            padding: 10px;
            flex: 1;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        .last-scan {
            margin-top: 15px;
            padding: 12px;
            background: #f0f0f0;
            border-radius: 10px;
            text-align: center;
        }
        .info {
            margin-top: 15px;
            padding: 12px;
            background: #e7f3ff;
            border-radius: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📷 Сканер</h1>
        
        <div id="status" class="status connecting">
            🔄 Подключение к кассе...
        </div>
        
        <button class="camera-btn" onclick="openCamera()">
            📸 Открыть камеру
        </button>
        
        <div class="manual-input">
            <input type="text" id="manualBarcode" placeholder="Введи штрихкод вручную">
            <button onclick="sendManualScan()" style="width:100%; padding:12px;">Отправить</button>
        </div>
        
        <div class="test-buttons">
            <button class="test-btn" onclick="sendBarcode('4601234567890')">🥛 Молоко</button>
            <button class="test-btn" onclick="sendBarcode('6901234567892')">🍞 Хлеб</button>
            <button class="test-btn" onclick="sendBarcode('4812345678901')">🍎 Яблоки</button>
            <button class="test-btn" onclick="sendBarcode('9999999999999')">❓ Новый</button>
        </div>
        
        <div class="last-scan" id="lastScan">
            Последний скан: --
        </div>
        
        <div class="info">
            💡 Нажми на зеленую кнопку, сфотографируй штрихкод,<br>
            и он автоматически отправится на кассу!
        </div>
    </div>

    <script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        let conn = null;
        const urlParams = new URLSearchParams(location.search);
        const peerId = urlParams.get('peerId');
        
        if (peerId) {
            const peer = new Peer();
            
            peer.on('open', () => {
                conn = peer.connect(peerId);
                
                conn.on('open', () => {
                    document.getElementById('status').innerHTML = '🟢 Подключено к кассе!';
                    document.getElementById('status').className = 'status connected';
                });
                
                conn.on('close', () => {
                    document.getElementById('status').innerHTML = '🔴 Отключено от кассы';
                    document.getElementById('status').className = 'status connecting';
                });
            });
        } else {
            document.getElementById('status').innerHTML = '❌ Ошибка: нет ID кассы';
        }
        
        function sendBarcode(barcode) {
            if (conn && conn.open) {
                conn.send(JSON.stringify({ barcode }));
                document.getElementById('lastScan').innerHTML = `Последний скан: ${barcode}`;
                showToast(`✅ Отправлено: ${barcode}`);
            } else {
                alert('Нет подключения к кассе');
            }
        }
        
        function sendManualScan() {
            const barcode = document.getElementById('manualBarcode').value.trim();
            if (barcode) {
                sendBarcode(barcode);
                document.getElementById('manualBarcode').value = '';
            }
        }
        
        function openCamera() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.capture = 'environment';
            
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                showToast('🔄 Распознаю...');
                
                try {
                    const img = await createImageBitmap(file);
                    const codeReader = new ZXing.BrowserMultiFormatReader();
                    const result = await codeReader.decodeFromImageElement(img);
                    
                    if (result && result.text) {
                        sendBarcode(result.text);
                    } else {
                        showToast('❌ Не распознано');
                    }
                } catch (error) {
                    showToast('❌ Сфотографируй четче');
                }
            };
            
            input.click();
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.background = 'rgba(0,0,0,0.8)';
            toast.style.color = 'white';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '20px';
            toast.style.zIndex = '9999';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
