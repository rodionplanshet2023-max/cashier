<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Сканер</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .login-wrap { padding: 30px; display: flex; flex-direction: column; justify-content: center; height: 100vh; max-width: 400px; margin: 0 auto; width: 100%; }
        h2 { text-align: center; margin-bottom: 30px; color: white; }
        input { background: rgba(255,255,255,0.9); border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; font-size: 18px; text-align: center; }
        .btn-connect { background: #28a745; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .scanner-wrap { display: none; flex: 1; flex-direction: column; }
        #reader { width: 100%; flex: 1; min-height: 400px; background: black; }
        .status-bar { padding: 20px; background: rgba(0,0,0,0.8); text-align: center; }
        .status-text { font-weight: bold; color: #4caf50; margin-bottom: 10px; }
        .btn-stop { background: #dc3545; color: white; border: none; padding: 12px 24px; border-radius: 25px; cursor: pointer; }
        .error-msg { color: #ff5252; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div id="login-screen" class="login-wrap">
    <h2>📱 Подключение</h2>
    <input type="tel" id="input-id" placeholder="Код (6 цифр)" maxlength="6">
    <input type="text" id="input-pass" placeholder="Пароль">
    <button class="btn-connect" onclick="attemptConnection()">🔗 Подключиться</button>
    <div id="error-msg" class="error-msg"></div>
</div>

<div id="scanner-screen" class="scanner-wrap">
    <div id="reader"></div>
    <div class="status-bar">
        <div id="scan-status" class="status-text">📷 Готов</div>
        <button class="btn-stop" onclick="location.reload()">Отключиться</button>
    </div>
</div>

<script>
    // ============ ВСТАВЬ СВОЙ FIREBASE КОНФИГ СЮДА (ТОТ ЖЕ, ЧТО В index.html) ============
    const firebaseConfig = {
      apiKey: "AIzaSyAQVrsSUqhrgujZ4L9UqTKdfR2AByigeD0",
      authDomain: "cashier-terminal.firebaseapp.com",
      projectId: "cashier-terminal",
      storageBucket: "cashier-terminal.firebasestorage.app",
      messagingSenderId: "152891465999",
      appId: "1:152891465999:web:f3e58d7f63b31d37371e7a"
    };
    // ====================================================
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    
    let activeSessionId = null;
    let scanner = null;
    
    auth.signInAnonymously().catch(console.error);
    
    function attemptConnection() {
        const id = document.getElementById('input-id').value;
        const pass = document.getElementById('input-pass').value.trim();
        const errorMsg = document.getElementById('error-msg');
        if(id.length < 6 || !pass) { errorMsg.innerText = "Заполните поля"; return; }
        errorMsg.innerText = "Проверка...";
        db.ref('sessions/' + id).once('value').then((snapshot) => {
            const data = snapshot.val();
            if(data && data.password === pass.toUpperCase()) {
                activeSessionId = id;
                startScanner();
            } else { errorMsg.innerText = "❌ Неверный код или пароль"; }
        }).catch(err => { errorMsg.innerText = "Ошибка подключения"; });
    }
    
    function startScanner() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('scanner-screen').style.display = 'flex';
        scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
            (text) => {
                if(!activeSessionId) return;
                if(navigator.vibrate) navigator.vibrate(200);
                const status = document.getElementById('scan-status');
                status.innerHTML = "📤 Отправка...";
                db.ref('sessions/' + activeSessionId).update({ scannedCode: text }).then(() => {
                    status.innerHTML = "✅ Отправлено!";
                    setTimeout(() => { status.innerHTML = "📷 Готов"; }, 1500);
                }).catch(() => { status.innerHTML = "❌ Ошибка"; setTimeout(() => { status.innerHTML = "📷 Готов"; }, 2000); });
            },
            (err) => {}
        ).catch(err => alert("Ошибка камеры: " + err));
    }
</script>
</body>
</html>
